name: Testes E2E

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes Cypress
        run: npm test

      - name: Gerar pasta pública
        run: |
          mkdir public
          cp -r cypress/reports/* public/

      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: cypress-run
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy Pages
        uses: actions/deploy-pages@v4